# This workflow is meant as an extended CI run that includes certain features that shall be tested
# and JDK versions that are supported but not considered default.

name: "Nightly (beta)"

on:
  workflow_dispatch:

permissions: read-all

jobs:
  pre-compile-checks:
    name: "Pre-compile Checks"
    uses: ./.github/workflows/template.pre-compile-checks.yml

  java11:
    name: "Java 11"
    uses: ./.github/workflows/template.flink-ci.yml
    with:
      workflow-caller-id: java11
      environment: 'PROFILE="-Dinclude_hadoop_aws -Djdk11 -Pjava11-target"'
      jdk_version: 11
    secrets:
      s3_bucket: ${{ secrets.IT_CASE_S3_BUCKET }}
      s3_access_key: ${{ secrets.IT_CASE_S3_ACCESS_KEY }}
      s3_secret_key: ${{ secrets.IT_CASE_S3_SECRET_KEY }}
  java21:
    name: "Java 21"
    uses: ./.github/workflows/template.flink-ci.yml
    with:
      workflow-caller-id: java21
      environment: 'PROFILE="-Dinclude_hadoop_aws -Djdk21 -Pjava21-target"'
      jdk_version: 21
    secrets:
      s3_bucket: ${{ secrets.IT_CASE_S3_BUCKET }}
      s3_access_key: ${{ secrets.IT_CASE_S3_ACCESS_KEY }}
      s3_secret_key: ${{ secrets.IT_CASE_S3_SECRET_KEY }}
  hadoop313:
    name: "Hadoop 3.1.3"
    uses: ./.github/workflows/template.flink-ci.yml
    with:
      workflow-caller-id: hadoop313
      environment: 'PROFILE="-Dflink.hadoop.version=3.2.3 -Phadoop3-tests,hive3 -Djdk17 -Pjava17-target"'
      jdk_version: 17
    secrets:
      s3_bucket: ${{ secrets.IT_CASE_S3_BUCKET }}
      s3_access_key: ${{ secrets.IT_CASE_S3_ACCESS_KEY }}
      s3_secret_key: ${{ secrets.IT_CASE_S3_SECRET_KEY }}
  adaptive-scheduler:
    name: "AdaptiveScheduler"
    uses: ./.github/workflows/template.flink-ci.yml
    with:
      workflow-caller-id: adaptive-scheduler
      environment: 'PROFILE="-Penable-adaptive-scheduler -Djdk17 -Pjava17-target"'
      jdk_version: 17
    secrets:
      s3_bucket: ${{ secrets.IT_CASE_S3_BUCKET }}
      s3_access_key: ${{ secrets.IT_CASE_S3_ACCESS_KEY }}
      s3_secret_key: ${{ secrets.IT_CASE_S3_SECRET_KEY }}

  snapshot_binary:
    name: "Snapshot Binary Release"
    runs-on: ubuntu-24.04
    container:
      image: apache/flink-ci-docker:java_8_11_17_21_25_maven_386_jammy
      options: --init --privileged
    env:
      MOUNTED_WORKING_DIR: /__w/flink/flink
      CONTAINER_LOCAL_WORKING_DIR: /root/flink
      MAVEN_REPO_FOLDER: /root/.m2/repository
      MAVEN_ARGS: -Dmaven.repo.local=/root/.m2/repository
    steps:
      - name: "Flink Checkout"
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: "Initialize job"
        uses: "./.github/actions/job_init"
        with:
          jdk_version: 11
          maven_repo_folder: ${{ env.MAVEN_REPO_FOLDER }}
          source_directory: ${{ env.MOUNTED_WORKING_DIR }}
          target_directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
      - name: "Build snapshot binary release"
        working-directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
        run: |
          source ./tools/ci/maven-utils.sh
          run_mvn -version
          export MVN="run_mvn"
          export RELEASE_VERSION=$(MVN_RUN_VERBOSE=false run_mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Determined RELEASE_VERSION as '$RELEASE_VERSION'"
          cd tools
          MVN_RUN_VERBOSE=true SKIP_GPG=true ./releasing/create_binary_release.sh
          echo "Created files:"
          find ./releasing/release
          cd ..
      - name: "Upload artifacts to S3"
        working-directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
        run: |
          source ./tools/ci/deploy_nightly_to_s3.sh
          upload_to_s3 ./tools/releasing/release
        env:
          ARTIFACTS_S3_BUCKET: ${{ secrets.ARTIFACTS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.ARTIFACTS_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ARTIFACTS_AWS_SECRET_ACCESS_KEY }}

  snapshot_maven:
    name: "Snapshot Maven Deploy"
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    container:
      image: apache/flink-ci-docker:java_8_11_17_21_25_maven_386_jammy
      options: --init --privileged
    env:
      MOUNTED_WORKING_DIR: /__w/flink/flink
      CONTAINER_LOCAL_WORKING_DIR: /root/flink
      MAVEN_REPO_FOLDER: /root/.m2/repository
      MAVEN_ARGS: -Dmaven.repo.local=/root/.m2/repository
    steps:
      - name: "Flink Checkout"
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: "Initialize job"
        uses: "./.github/actions/job_init"
        with:
          jdk_version: 11
          maven_repo_folder: ${{ env.MAVEN_REPO_FOLDER }}
          source_directory: ${{ env.MOUNTED_WORKING_DIR }}
          target_directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
      - name: "Deploy Maven snapshot"
        working-directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
        run: |
          source ./tools/ci/maven-utils.sh
          run_mvn -version

          cd tools
          cat << EOF > deploy-settings.xml
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>apache.snapshots.https</id>
                <username>${MAVEN_DEPLOY_USER}</username>
                <password>${MAVEN_DEPLOY_PASS}</password>
              </server>
            </servers>
            <mirrors>
              <mirror>
                <id>google-maven-central</id>
                <name>GCS Maven Central mirror</name>
                <url>https://maven-central-eu.storage-download.googleapis.com/maven2/</url>
                <mirrorOf>central</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          EOF

          export CUSTOM_OPTIONS="${MVN_GLOBAL_OPTIONS_WITHOUT_MIRROR} -Dgpg.skip -Drat.skip -Dcheckstyle.skip --settings $(pwd)/deploy-settings.xml"
          export MVN_RUN_VERBOSE=true
          ./releasing/deploy_staging_jars.sh
        env:
          MAVEN_DEPLOY_USER: ${{ secrets.MAVEN_DEPLOY_USER }}
          MAVEN_DEPLOY_PASS: ${{ secrets.MAVEN_DEPLOY_PASS }}

  build_python_wheels:
    name: "Build Python Wheels on ${{ matrix.os_name }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: linux
          - os: macos-latest
            os_name: macos
    steps:
      - name: "Checkout the repository"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: "Stringify workflow name"
        uses: "./.github/actions/stringify"
        id: stringify_workflow
        with:
          value: ${{ github.workflow }}
      # Used to host cibuildwheel
      - name: "Setup Python"
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: "Install cibuildwheel"
        # Need to limit setuptools here in order to apply limitations for transitive dependencies
        run: |
          python -m pip install cibuildwheel==2.16.5
          echo "setuptools<82" > /tmp/build-constraints.txt
      - name: "Build python wheels for ${{ matrix.os_name }}"
        run: python -m cibuildwheel --output-dir flink-python/dist flink-python
        env:
          # Skip -musllinux on Linux builds
          CIBW_SKIP: "*-musllinux*"
          # Use manylinux2014 on Linux
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_BEFORE_ALL_LINUX: pip install patchelf
          CIBW_BEFORE_BUILD_LINUX: pip install --upgrade pip && pip install --group flink-python/pyproject.toml:dev
          CIBW_ENVIRONMENT_LINUX: CFLAGS="-I. -include ./dev/glibc_version_fix.h"
          # Run auditwheel repair on Linux
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w {dest_dir} {wheel}"
          # Skip repair on MacOS
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""
          PIP_CONSTRAINT: /tmp/build-constraints.txt
      - name: "Upload python wheels"
        uses: actions/upload-artifact@v7
        with:
          name: wheel_${{ matrix.os_name }}_${{ steps.stringify_workflow.outputs.stringified_value }}-${{ github.run_number }}
          path: flink-python/dist/**
